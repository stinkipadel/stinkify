<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Stinkify</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0f;
    color: #f0f0f0;
    font-family: 'Syne', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 24px;
  }
  .emoji { font-size: 72px; margin-bottom: 8px; }
  h1 { font-size: 80px; font-weight: 800; color: #b4f045; letter-spacing: -4px; text-shadow: 0 0 40px rgba(180,240,69,0.4); }
  p { color: #6b6b80; font-family: 'Space Mono', monospace; font-size: 13px; }
  a {
    margin-top: 8px;
    color: #b4f045;
    font-weight: 700;
    text-decoration: none;
    border: 1px solid rgba(180,240,69,0.4);
    padding: 10px 24px;
    border-radius: 24px;
    font-size: 14px;
    transition: all 0.15s;
  }
  a:hover { background: rgba(180,240,69,0.1); }
</style>
</head>
<body>
  <div class="emoji">🤢</div>
  <h1>404</h1>
