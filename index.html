<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stinkify 🤢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --dominant: 180,240,69;
    --accent-dim: rgba(180,240,69,0.12);
    --text: #f0f0f0;
    --muted: #6b6b80;
    --border: rgba(255,255,255,0.06);
    --player-h: 88px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    height: 100dvh;
  }

  .app { display:flex; flex:1; overflow:hidden; min-height:0; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 270px; background: var(--bg2);
    display: flex; flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden; flex-shrink: 0;
  }
  .sidebar-header {
    padding: 22px 18px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; cursor: pointer; user-select: none;
  }
  .logo {
    font-size: 24px; font-weight: 800; letter-spacing: -1px;
    color: rgb(var(--dominant));
    text-shadow: 0 0 20px rgba(var(--dominant),0.5);
    display: inline-block; transition: text-shadow 0.6s;
  }
  .logo.shake { animation: logoShake 0.5s ease; }
  .logo span { color: var(--text); }
  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px; color: var(--muted);
    margin-top: 2px; letter-spacing: 2px; text-transform: uppercase;
  }
  .sidebar-section {
    padding: 14px 18px 6px;
    font-size: 10px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--muted);
    flex-shrink: 0;
  }
  .song-list {
    flex:1; overflow-y:auto; padding:4px 8px 16px;
    scrollbar-width:thin; scrollbar-color:var(--bg3) transparent; min-height:0;
  }
  .song-item {
    display:flex; align-items:center; gap:10px;
    padding:7px 10px; border-radius:8px; cursor:pointer;
    transition:background 0.15s; position:relative;
  }
  .song-item:hover { background: var(--bg3); }
  .song-item.active { background: rgba(var(--dominant),0.12); }
  .song-item.active .song-item-title { color: rgb(var(--dominant)); }
  .song-thumb {
    width:40px; height:40px; border-radius:6px;
    object-fit:cover; flex-shrink:0; background:var(--bg3);
  }
  .song-item.active .song-thumb { box-shadow: 0 0 0 2px rgba(var(--dominant),0.6); }
  .song-item-info { min-width:0; flex:1; }
  .song-item-title { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song-item-artist { font-size:10px; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song-item-meta { display:flex; align-items:center; gap:5px; flex-shrink:0; }
  .play-count { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); background:var(--bg3); padding:1px 5px; border-radius:8px; }
  .stink-badge { font-size:10px; }
  .play-indicator {
    width:7px; height:7px; background:rgb(var(--dominant));
    border-radius:50%; display:none;
    box-shadow:0 0 8px rgba(var(--dominant),0.8);
    animation:pulse 1.4s ease-in-out infinite; flex-shrink:0;
  }
  .song-item.active .play-indicator { display:block; }

  /* ── MAIN ── */
  .main {
    flex:1; display:flex; flex-direction:column;
    overflow:hidden; position:relative;
    background: linear-gradient(160deg, #111120 0%, var(--bg) 60%);
  }
  .bg-glow {
    position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at 50% 0%, rgba(var(--dominant),0.08) 0%, transparent 60%);
    transition: background 0.8s;
  }
  .now-playing-area {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:20px 20px 10px; overflow:hidden; position:relative; min-height:0;
  }

  /* vinyl toggle */
  .vinyl-toggle {
    position:absolute; top:14px; right:14px;
    background:rgba(0,0,0,0.5); border:1px solid var(--border);
    border-radius:8px; color:var(--muted); padding:5px 12px;
    font-size:10px; font-family:'Space Mono',monospace; cursor:pointer;
    transition:all 0.2s; backdrop-filter:blur(8px); z-index:2;
  }
  .vinyl-toggle:hover { color:rgb(var(--dominant)); border-color:rgba(var(--dominant),0.4); }
  .vinyl-toggle.on { color:rgb(var(--dominant)); border-color:rgba(var(--dominant),0.5); background:rgba(var(--dominant),0.08); }

  /* cover */
  .cover-wrap { position:relative; margin-bottom:18px; flex-shrink:0; }
  .cover-img {
    width: min(200px,36vh); height: min(200px,36vh);
    border-radius:16px; object-fit:contain;
    background: rgba(var(--dominant),0.07); display:block;
    box-shadow: 0 16px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
    transition: border-radius 0.4s, box-shadow 0.4s, transform 0.4s;
  }
  .cover-img.vinyl {
    border-radius: 50%;
    animation: vinylSpin 8s linear infinite;
    box-shadow: 0 16px 50px rgba(0,0,0,0.6),
                0 0 0 3px rgba(var(--dominant),0.35),
                0 0 0 9px rgba(0,0,0,0.5),
                0 0 0 10px rgba(var(--dominant),0.1);
  }
  .cover-img.vinyl.paused { animation-play-state: paused; }
  .vinyl-dot {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    width:16px; height:16px; border-radius:50%;
    background:var(--bg); border:2px solid rgba(var(--dominant),0.5);
    pointer-events:none; opacity:0; transition:opacity 0.4s;
  }
  .cover-img.vinyl ~ .vinyl-dot { opacity:1; }

  /* track info */
  .track-info { text-align:center; flex-shrink:0; }
  .track-title { font-size:24px; font-weight:800; line-height:1.1; max-width:360px; margin-bottom:4px; letter-spacing:-0.5px; }
  .track-artist { font-size:12px; color:var(--muted); font-family:'Space Mono',monospace; margin-bottom:3px; }
  .track-album { font-size:11px; color:rgb(var(--dominant)); font-weight:600; opacity:0.85; margin-bottom:4px; transition:color 0.6s; }
  .track-stink { font-size:14px; margin-bottom:10px; }

  /* action buttons row */
  .action-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap; justify-content:center; }
  .action-btn {
    font-family:'Space Mono',monospace; font-size:10px;
    color:var(--muted); background:none;
    border:1px solid var(--border); padding:5px 12px;
    border-radius:20px; cursor:pointer;
    transition:all 0.2s; letter-spacing:0.5px;
  }
  .action-btn:hover { color:rgb(var(--dominant)); border-color:rgba(var(--dominant),0.5); background:rgba(var(--dominant),0.06); }
  .action-btn.on { color:rgb(var(--dominant)); border-color:rgba(var(--dominant),0.5); background:rgba(var(--dominant),0.08); }

  /* lyrics */
  .lyrics-panel {
    width:100%; max-width:400px; flex-shrink:0;
    max-height:0; overflow:hidden;
    transition: max-height 0.4s ease;
  }
  .lyrics-panel.open { max-height:190px; }
  .lyrics-inner {
    overflow-y:auto; max-height:190px;
    padding:12px 16px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border); border-radius:12px;
    scrollbar-width:thin; scrollbar-color:var(--bg3) transparent;
  }
  .lyric-line {
    font-size:13px; line-height:1.8; color:var(--muted);
    transition:color 0.3s, transform 0.3s;
    text-align:center; padding:1px 0;
  }
  .lyric-line.active {
    color:var(--text); font-size:15px; font-weight:700;
    transform:scale(1.04);
  }
  .lyric-empty {
    font-size:12px; color:var(--muted); text-align:center;
    font-family:'Space Mono',monospace; padding:8px 0;
  }

  /* ── PLAYER BAR ── */
  .player-bar {
    background:rgba(10,10,18,0.97);
    border-top:1px solid var(--border);
    display:flex; align-items:center;
    padding:0 16px; gap:12px;
    backdrop-filter:blur(20px);
    flex-shrink:0; z-index:10;
    height:var(--player-h);
  }
  .player-thumb { width:46px; height:46px; border-radius:8px; object-fit:cover; flex-shrink:0; }
  .player-info { min-width:0; width:150px; flex-shrink:0; }
  .player-title { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .player-artist { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; margin-top:2px; }
  .player-controls { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; min-width:0; }
  .control-btns { display:flex; align-items:center; gap:10px; }
  .ctrl-btn {
    background:none; border:none; color:var(--muted);
    cursor:pointer; font-size:16px; padding:4px; border-radius:50%;
    transition:color 0.15s, transform 0.1s;
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .ctrl-btn:hover { color:var(--text); transform:scale(1.1); }
  .ctrl-btn.on { color:rgb(var(--dominant)); }
  .ctrl-btn.on::after {
    content:''; position:absolute; bottom:-3px; left:50%; transform:translateX(-50%);
    width:4px; height:4px; border-radius:50%; background:rgb(var(--dominant));
  }
  .ctrl-btn.play-pause {
    width:38px; height:38px;
    background:rgb(var(--dominant)); color:#000;
    font-size:14px; border-radius:50%;
    box-shadow:0 0 20px rgba(var(--dominant),0.4);
    transition:transform 0.1s, background 0.6s, box-shadow 0.6s;
  }
  .ctrl-btn.play-pause:hover { transform:scale(1.08); }
  .progress-wrap { display:flex; align-items:center; gap:7px; width:100%; }
  .time { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); min-width:30px; text-align:center; flex-shrink:0; }
  .progress-track { flex:1; height:4px; background:var(--bg3); border-radius:2px; cursor:pointer; }
  .progress-fill { height:100%; background:rgb(var(--dominant)); border-radius:2px; width:0%; transition:width 0.1s linear, background 0.6s; pointer-events:none; }
  .vol-row { display:flex; align-items:center; gap:6px; width:110px; flex-shrink:0; }
  .vol-icon { font-size:13px; color:var(--muted); cursor:pointer; }
  input[type=range] {
    -webkit-appearance:none; appearance:none;
    background:var(--bg3); height:3px; border-radius:2px;
    outline:none; flex:1; cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance:none; width:11px; height:11px;
    background:rgb(var(--dominant)); border-radius:50%; transition:background 0.6s;
  }

  /* ── EASTER EGG ── */
  .easter-overlay {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,0.9); z-index:200;
    align-items:center; justify-content:center;
    flex-direction:column; gap:16px; cursor:pointer;
  }
  .easter-overlay.show { display:flex; }
  .easter-emoji { font-size:80px; animation:easterBounce 0.6s ease infinite alternate; }
  .easter-msg { font-size:20px; font-weight:800; color:rgb(var(--dominant)); text-align:center; padding:0 20px; }
  .easter-sub { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }

  /* ── ANIMATIONS ── */
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
  @keyframes vinylSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes logoShake {
    0%{transform:rotate(0deg)} 15%{transform:rotate(-8deg)} 30%{transform:rotate(8deg)}
    45%{transform:rotate(-6deg)} 60%{transform:rotate(6deg)} 75%{transform:rotate(-3deg)}
    90%{transform:rotate(3deg)} 100%{transform:rotate(0deg)}
  }
  @keyframes easterBounce { from{transform:scale(1)rotate(-5deg)} to{transform:scale(1.2)rotate(5deg)} }

  .song-list::-webkit-scrollbar { width:3px; }
  .song-list::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }
  .lyrics-inner::-webkit-scrollbar { width:3px; }
  .lyrics-inner::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:2px; }

  /* ── MOBILE ── */
  @media (max-width:640px) {
    .app { flex-direction:column; }
    .sidebar { width:100%; height:auto; border-right:none; border-bottom:1px solid var(--border); flex-shrink:0; }
    .sidebar-header { padding:10px 14px 8px; }
    .logo { font-size:19px; }
    .logo-sub { display:none; }
    .sidebar-section { padding:5px 14px 3px; font-size:9px; }
    .song-list {
      display:flex; flex-direction:row;
      overflow-x:auto; overflow-y:hidden;
      padding:6px 10px 10px; gap:8px; scrollbar-width:none;
    }
    .song-list::-webkit-scrollbar { display:none; }
    .song-item {
      flex-direction:column; align-items:center; text-align:center;
      gap:4px; padding:7px; min-width:68px; max-width:68px; border-radius:10px;
    }
    .song-thumb { width:50px; height:50px; border-radius:8px; }
    .song-item-title { font-size:9px; white-space:normal; line-height:1.2; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
    .song-item-artist, .song-item-meta { display:none; }
    .play-indicator { position:absolute; top:4px; right:4px; }

    .now-playing-area { padding:14px 14px 8px; justify-content:flex-start; }
    .cover-img { width:min(140px,34vw); height:min(140px,34vw); }
    .cover-wrap { margin-bottom:12px; }
    .track-title { font-size:17px; max-width:260px; }
    .vinyl-toggle { top:8px; right:8px; font-size:9px; padding:3px 8px; }
    .lyrics-panel.open { max-height:120px; }
    .lyrics-inner { max-height:120px; }

    .player-bar { padding:8px 12px 10px; gap:8px; height:auto; }
    .player-thumb { width:38px; height:38px; }
    .player-info { width:100px; }
    .player-title { font-size:11px; }
    .vol-row { display:none; }
    .time { font-size:8px; min-width:24px; }
    .ctrl-btn { font-size:14px; }
    .ctrl-btn.play-pause { width:34px; height:34px; font-size:12px; }
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header" id="logoWrap">
      <div class="logo" id="logo">Stink<span>ify</span> 🤢</div>
      <div class="logo-sub">by @stinki97 · Suno</div>
    </div>
    <div class="sidebar-section">Le mie canzoni</div>
    <div class="song-list" id="songList"></div>
  </aside>

  <main class="main">
    <div class="bg-glow" id="bgGlow"></div>
    <button class="vinyl-toggle" id="vinylToggle" onclick="toggleVinyl()">💿 Vinile</button>

    <div class="now-playing-area" id="nowPlayingArea">
      <div class="cover-wrap">
        <img class="cover-img" id="mainCover" src="" alt="Cover" crossorigin="anonymous">
        <div class="vinyl-dot" id="vinylDot"></div>
      </div>

      <div class="track-info">
        <div class="track-title" id="mainTitle">Seleziona una canzone</div>
        <div class="track-artist" id="mainArtist">@stinki97</div>
        <div class="track-album" id="mainAlbum"></div>
        <div class="track-stink" id="mainStink"></div>
      </div>

      <div class="action-row">
        <button class="action-btn" id="karaokeBtn" onclick="toggleKaraoke()" style="display:none">🎤 Karaoke</button>
        <a class="action-btn" href="https://suno.com/@stinki97" target="_blank">↗ Suno</a>
      </div>

      <div class="lyrics-panel" id="lyricsPanel">
        <div class="lyrics-inner" id="lyricsInner"></div>
      </div>
    </div>
  </main>
</div>

<!-- easter egg -->
<div class="easter-overlay" id="easterOverlay" onclick="closeEaster()">
  <div class="easter-emoji">🤢</div>
  <div class="easter-msg">HAI TROVATO LO STINK MODE!</div>
  <div class="easter-sub">tocca per chiudere... se ce la fai</div>
</div>

<div class="player-bar">
  <img class="player-thumb" id="playerThumb" src="" alt="">
  <div class="player-info">
    <div class="player-title" id="playerTitle">—</div>
    <div class="player-artist">@stinki97</div>
  </div>
  <div class="player-controls">
    <div class="control-btns">
      <button class="ctrl-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Shuffle">🔀</button>
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="ctrl-btn play-pause" id="playPauseBtn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
      <button class="ctrl-btn" id="repeatBtn" onclick="toggleRepeat()" title="Repeat">🔁</button>
    </div>
    <div class="progress-wrap">
      <span class="time" id="currentTime">0:00</span>
      <div class="progress-track" onclick="seekTo(event)">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time" id="totalTime">0:00</span>
    </div>
    <div class="vol-row">
      <span class="vol-icon" onclick="toggleMute()">🔊</span>
      <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8" oninput="setVolume(this.value)">
    </div>
  </div>
</div>

<audio id="audioEl"></audio>

<script>
// ── DATA ──
const songs = JSON.parse(document.getElementById('songsData').textContent);

function enc(f) { return f ? encodeURI(f) : null; }
function stinkStr(n) { return '🤢'.repeat(n || 0); }

// ── STATE ──
let currentIdx = -1;
let isPlaying  = false;
let shuffleOn  = false;
let repeatOn   = false;
let vinylOn    = false;
let isMuted    = false;
let karaokeOpen = false;
let shuffleOrder = [];

// ── PLAY COUNTS ──
function getCounts() {
  try { return JSON.parse(localStorage.getItem('stinkify_counts') || '{}'); } catch { return {}; }
}
function incCount(idx) {
  const c = getCounts();
  c[idx] = (c[idx] || 0) + 1;
  try { localStorage.setItem('stinkify_counts', JSON.stringify(c)); } catch {}
  const el = document.getElementById('count-' + idx);
  if (el) el.textContent = '▶ ' + c[idx];
}

// ── BUILD SIDEBAR ──
const songListEl = document.getElementById('songList');
const counts = getCounts();
songs.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'song-item';
  el.id = 'song-' + i;
  el.onclick = () => loadSong(i, true);
  el.innerHTML = `
    <img class="song-thumb" src="${enc(s.cover)}" alt="${s.title}">
    <div class="song-item-info">
      <div class="song-item-title">${s.title}</div>
      <div class="song-item-artist">${s.artist}</div>
    </div>
    <div class="song-item-meta">
      <span class="stink-badge">${stinkStr(s.stink)}</span>
      <span class="play-count" id="count-${i}">${counts[i] ? '▶ '+counts[i] : ''}</span>
    </div>
    <div class="play-indicator"></div>
  `;
  songListEl.appendChild(el);
});

// ── DOM REFS ──
const audioEl      = document.getElementById('audioEl');
const mainCover    = document.getElementById('mainCover');
const mainTitle    = document.getElementById('mainTitle');
const mainArtist   = document.getElementById('mainArtist');
const mainAlbum    = document.getElementById('mainAlbum');
const mainStink    = document.getElementById('mainStink');
const playerThumb  = document.getElementById('playerThumb');
const playerTitle  = document.getElementById('playerTitle');
const playPauseBtn = document.getElementById('playPauseBtn');
const progressFill = document.getElementById('progressFill');
const currentTimeEl= document.getElementById('currentTime');
const totalTimeEl  = document.getElementById('totalTime');
const karaokeBtn   = document.getElementById('karaokeBtn');
const lyricsPanel  = document.getElementById('lyricsPanel');
const lyricsInner  = document.getElementById('lyricsInner');
const vinylToggle  = document.getElementById('vinylToggle');
const bgGlow       = document.getElementById('bgGlow');

// ── DOMINANT COLOR ──
function extractColor(imgEl) {
  try {
    const c = document.createElement('canvas');
    c.width = 16; c.height = 16;
    const ctx = c.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, 16, 16);
    const d = ctx.getImageData(0,0,16,16).data;
    let r=0,g=0,b=0,n=0;
    for (let i=0;i<d.length;i+=4) {
      const bright=(d[i]+d[i+1]+d[i+2])/3;
      if (bright<20||bright>235) continue;
      r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++;
    }
    if (!n) return;
    applyColor(Math.round(r/n), Math.round(g/n), Math.round(b/n));
  } catch(e) {}
}
function applyColor(r,g,b) {
  const v = `${r},${g},${b}`;
  document.documentElement.style.setProperty('--dominant', v);
  bgGlow.style.background = `radial-gradient(ellipse at 50% 0%, rgba(${v},0.09) 0%, transparent 60%)`;
}

// ── LOAD SONG ──
function loadSong(idx, play=false) {
  document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
  currentIdx = idx;
  const s = songs[idx];
  const item = document.getElementById('song-'+idx);
  item.classList.add('active');
  item.scrollIntoView({block:'nearest', inline:'nearest', behavior:'smooth'});

  mainCover.src = enc(s.cover);
  playerThumb.src = enc(s.cover);
  mainCover.onload = () => extractColor(mainCover);

  mainTitle.textContent  = s.title;
  mainArtist.textContent = s.artist;
  mainAlbum.textContent  = s.album;
  mainStink.textContent  = stinkStr(s.stink);
  playerTitle.textContent = s.title;

  updateCoverClass();

  // karaoke button
  const hasLyrics = s.lyrics && s.lyrics.length > 0;
  karaokeBtn.style.display = hasLyrics ? 'inline-block' : 'none';
  if (!hasLyrics && karaokeOpen) {
    karaokeOpen = false;
    lyricsPanel.classList.remove('open');
    karaokeBtn.classList.remove('on');
  }
  setupLyrics(s);

  // audio
  audioEl.pause();
  progressFill.style.width = '0%';
  currentTimeEl.textContent = '0:00';
  totalTimeEl.textContent   = '0:00';

  if (s.audio) {
    audioEl.src = enc(s.audio);
    audioEl.volume = document.getElementById('volSlider').value;
    if (play) {
      audioEl.play()
        .then(() => { isPlaying=true; updatePlayBtn(); updateCoverClass(); incCount(idx); })
        .catch(() => {});
    } else {
      isPlaying = false; updatePlayBtn(); updateCoverClass();
    }
  } else {
    audioEl.src = '';
    isPlaying = false; updatePlayBtn(); updateCoverClass();
  }
}

// ── COVER CLASS ──
function updateCoverClass() {
  const cls = ['cover-img'];
  if (vinylOn) cls.push('vinyl');
  if (vinylOn && !isPlaying) cls.push('paused');
  mainCover.className = cls.join(' ');
}

// ── VINYL ──
function toggleVinyl() {
  vinylOn = !vinylOn;
  vinylToggle.textContent = vinylOn ? '🖼 Copertina' : '💿 Vinile';
  vinylToggle.classList.toggle('on', vinylOn);
  updateCoverClass();
}

// ── KARAOKE ──
function toggleKaraoke() {
  karaokeOpen = !karaokeOpen;
  lyricsPanel.classList.toggle('open', karaokeOpen);
  karaokeBtn.classList.toggle('on', karaokeOpen);
}

function setupLyrics(s) {
  lyricsInner.innerHTML = '';
  if (!s.lyrics || !s.lyrics.length) {
    lyricsInner.innerHTML = '<div class="lyric-empty">Testo non ancora disponibile 🎵</div>';
    return;
  }
  s.lyrics.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    div.id = 'lyric-'+i;
    div.textContent = typeof line === 'string' ? line : line.text;
    lyricsInner.appendChild(div);
  });
}

function updateLyricHighlight() {
  const s = songs[currentIdx];
  if (!s || !s.lyrics || !s.lyrics.length) return;
  const t = audioEl.currentTime;
  let active = -1;
  s.lyrics.forEach((line, i) => {
    if (typeof line === 'object' && line.time !== undefined && t >= line.time) active = i;
  });
  if (active < 0) return;
  document.querySelectorAll('.lyric-line').forEach((el, i) => {
    el.classList.toggle('active', i === active);
  });
  const el = document.getElementById('lyric-'+active);
  if (el) el.scrollIntoView({block:'center', behavior:'smooth'});
}

// ── PLAY / PAUSE ──
function togglePlay() {
  if (currentIdx === -1) { loadSong(0, true); return; }
  if (!songs[currentIdx].audio) return;
  if (isPlaying) {
    audioEl.pause();
  } else {
    audioEl.play().then(() => { incCount(currentIdx); }).catch(()=>{});
  }
}
function updatePlayBtn() { playPauseBtn.textContent = isPlaying ? '⏸' : '▶'; }

// ── PREV / NEXT ──
function prevTrack() {
  loadSong(currentIdx <= 0 ? songs.length-1 : currentIdx-1, isPlaying);
}
function nextTrack() {
  if (repeatOn) { audioEl.currentTime=0; audioEl.play().catch(()=>{}); return; }
  const idx = shuffleOn ? getShuffleIdx() : (currentIdx+1) % songs.length;
  loadSong(idx, isPlaying);
}
function getShuffleIdx() {
  if (!shuffleOrder.length) buildShuffle();
  return shuffleOrder.shift();
}
function buildShuffle() {
  shuffleOrder = songs.map((_,i)=>i).filter(i=>i!==currentIdx).sort(()=>Math.random()-0.5);
}

// ── SHUFFLE / REPEAT ──
function toggleShuffle() {
  shuffleOn = !shuffleOn;
  document.getElementById('shuffleBtn').classList.toggle('on', shuffleOn);
  if (shuffleOn) buildShuffle();
}
function toggleRepeat() {
  repeatOn = !repeatOn;
  document.getElementById('repeatBtn').classList.toggle('on', repeatOn);
}

// ── VOLUME / SEEK ──
function setVolume(v) { audioEl.volume=v; isMuted=(v==0); }
function toggleMute() {
  const sl = document.getElementById('volSlider');
  isMuted = !isMuted;
  sl.value = isMuted ? 0 : 0.8;
  audioEl.volume = sl.value;
}
function seekTo(e) {
  if (!audioEl.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audioEl.currentTime = ((e.clientX-rect.left)/rect.width)*audioEl.duration;
}

// ── AUDIO EVENTS ──
audioEl.addEventListener('timeupdate', () => {
  if (!audioEl.duration) return;
  progressFill.style.width = (audioEl.currentTime/audioEl.duration*100)+'%';
  currentTimeEl.textContent = fmtTime(audioEl.currentTime);
  updateLyricHighlight();
});
audioEl.addEventListener('loadedmetadata', () => { totalTimeEl.textContent = fmtTime(audioEl.duration); });
audioEl.addEventListener('ended', nextTrack);
audioEl.addEventListener('play',  () => { isPlaying=true;  updatePlayBtn(); updateCoverClass(); });
audioEl.addEventListener('pause', () => { isPlaying=false; updatePlayBtn(); updateCoverClass(); });

function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');
}

// ── SWIPE (mobile) ──
let touchStartX = 0;
const npa = document.getElementById('nowPlayingArea');
npa.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
npa.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { dx < 0 ? nextTrack() : prevTrack(); }
}, {passive:true});

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key==='Escape') closeEaster();
  if (e.key===' ' && e.target.tagName!=='INPUT') { e.preventDefault(); togglePlay(); }
  if (e.key==='ArrowRight' && !e.target.closest('input')) nextTrack();
  if (e.key==='ArrowLeft'  && !e.target.closest('input')) prevTrack();
});

// ── EASTER EGG ──
let logoClicks=0, logoTimer=null;
document.getElementById('logoWrap').addEventListener('click', () => {
  const logo = document.getElementById('logo');
  logo.classList.remove('shake');
  void logo.offsetWidth;
  logo.classList.add('shake');
  logoClicks++;
  clearTimeout(logoTimer);
  logoTimer = setTimeout(()=>{ logoClicks=0; }, 1500);
  if (logoClicks >= 5) {
    logoClicks = 0;
    document.getElementById('easterOverlay').classList.add('show');
    applyColor(255, 69, 180);
  }
});
function closeEaster() {
  document.getElementById('easterOverlay').classList.remove('show');
  if (currentIdx >= 0) extractColor(mainCover);
  else applyColor(180,240,69);
}

// ── INIT ──
loadSong(0, false);
</script>
</body>
</html>
